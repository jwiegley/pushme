Name:     'Databases/nixpkgs'
Priority: 10
Classes:
  - 'large'

Stores:
  hera:
    Path: $home/Databases/nixpkgs
    ReceiveFrom:
      - clio

  clio:
    Path: $home/Databases/nixpkgs
    ReceiveFrom:
      - hera

  tank:
    Path: $tank/Databases/nixpkgs
    PreserveXattrs: false
    ReceiveFrom:
      - hera
      - clio

Common:
  PreserveAttrs: true
  PreserveCrtimes: false
