Name:     'Databases'
Priority: 10
Classes:
  - 'large'

Stores:
  hera:
    Path: $home/Databases
    ReceiveFrom:
      - clio

  clio:
    Path: $home/Databases
    ReceiveFrom:
      - hera

  tank:
    Path: $tank/Databases
    PreserveXattrs: false
    ReceiveFrom:
      - hera
      - clio

Common:
  PreserveAttrs: true
  PreserveCrtimes: false
  Filters: |
    - /Apple II.dtBase2/
    - /Faith.dtBase2/
    - /Haskell.dtBase2/
    - /*.dtBase2/Backup*
