Name:     'Databases/Apple II.dtBase2'
Priority: 10
Classes:
  - 'large'

Stores:
  hera:
    Path: $home/Databases/Apple II.dtBase2
    ReceiveFrom:
      - clio

  clio:
    Path: $home/Databases/Apple II.dtBase2
    ReceiveFrom:
      - hera

  tank:
    Path: $tank/Databases/Apple II.dtBase2
    PreserveXattrs: false
    ReceiveFrom:
      - hera
      - clio

Common:
  PreserveAttrs: true
  PreserveCrtimes: false
  Filters: |
    - /Backup*
