Name:     'Home'
Priority: 20
Classes:
  - 'small'

Stores:
  hera:
    Path: $home
    ReceiveFrom:
      - clio
    ExtraFilters: |
      - /.claude
      - /.config/gh/hosts.yml
      - /.config/claude/personal/
      + /.config/claude/personal/settings.json
      - /.config/claude/git-ai/
      + /.config/claude/git-ai/settings.json
      - /mssql/

  clio:
    Path: $home
    ReceiveFrom:
      - hera
    ExtraFilters: |
      - /.claude
      - /.config/gh/hosts.yml
      - /.config/claude/positron/
      + /.config/claude/positron/settings.json
      - /mssql/

