Name:     'doc/Files.dtBase2'
Priority: 10
Classes:
  - 'small'

Stores:
  hera:
    Path: $home/doc/Files.dtBase2
    ReceiveFrom:
      - clio

  clio:
    Path: $home/doc/Files.dtBase2
    ReceiveFrom:
      - hera

  tank:
    Path: $tank/doc/Files.dtBase2
    PreserveXattrs: false
