Name:     'work/translation'
Priority: 50
Classes:
  - 'small'

Stores:
  hera:
    Path: $home/work/translation
    ReceiveFrom:
      - clio

  clio:
    Path: $home/work/translation
    ReceiveFrom:
      - hera

  tank:
    Path: $tank/work/translation
    PreserveXattrs: false
    ReceiveFrom:
      - hera
      - clio

Common:
  PreserveAttrs: true
  PreserveCrtimes: false
  Filters: |
    - *.agdai
    - *.d
    - *.glob
    - *.hi
    - *.o
    - *.vio
    - *.viok
    - *.vios
    - *.vo
    - *.vok
    - *.vos
    - *~
    - .*.aux
    - .*.cache
    - .cabal*
    - .cargo-home/
    - .cargo/
    - .envrc
    - .ghc.*
    - .ghcup/
    - .mypy_cache/
    - .rustup/
    - .vagrant/
    - .venv/
    - MAlonzo/
    - Makefile.coq
    - Makefile.coq.conf
    - _deps/
    - build/
    - cabal.project.local*
    - dist-newstyle/
    - dist/
    - gen/
    - node_modules/
    - result
    - result-*
    - target/
