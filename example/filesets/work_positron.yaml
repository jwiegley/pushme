Name:     'work/positron'
Priority: 50
Classes:
  - 'small'

Stores:
  hera:
    Path: $home/work/positron
    ReceiveFrom:
      - andoria
      - clio
    Options:
      - "--compress"
      - "--compress-choice=lz4"
      - "--compress-level=9"

  clio:
    Path: $home/work/positron
    ReceiveFrom:
      - andoria
      - hera
    Options:
      - "--compress"
      - "--compress-choice=lz4"
      - "--compress-level=9"

  tank:
    Path: $tank/work/positron
    PreserveXattrs: false
    ReceiveFrom:
      - hera
      - clio

  andoria:
    Path: $home
    PreserveXattrs: false
    ReceiveFrom: []

Common:
  PreserveAttrs: true
  PreserveCrtimes: false
  Filters: |
    - *.agdai
    - *.d
    - *.gguf
    - *.glob
    - *.hi
    - *.o
    - *.vio
    - *.viok
    - *.vios
    - *.vo
    - *.vok
    - *.vos
    - *~
    - .*.aux
    - .*.cache
    - .bun/
    - .cabal*
    - .cabal/
    - .cache/
    - .cargo-home/
    - .cargo/
    - .envrc
    - .ghc.*
    - .ghcup/
    - .ghcup/
    - .mypy_cache/
    - .npm/
    - .nvm/
    - .rustup/
    - .vagrant/
    - .venv/
    - /.local/lib/
    - /.local/share/cargo/
    - /.local/share/rustup/
    - /.local/share/uv/
    - /.local/state/
    - MAlonzo/
    - Makefile.coq
    - Makefile.coq.conf
    - _deps/
    - build/
    - cabal.project.local*
    - dist-newstyle/
    - dist/
    - gen/
    - node_modules/
    - result
    - result-*
    - target/
