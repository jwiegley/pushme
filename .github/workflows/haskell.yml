name: Haskell CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: haskell-actions/setup@v2
      with:
        ghc-version: '9.10'
        cabal-version: '3.10'

    - name: Cache
      uses: actions/cache@v4
      env:
        cache-name: cache-cabal
      with:
        path: ~/.cabal
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('**/cabal.project') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-

    - name: Install dependencies
      run: |
        cabal update
        cabal build --only-dependencies --enable-tests --enable-benchmarks

    - name: Build (warnings as errors)
      run: cabal build --enable-tests --enable-benchmarks --ghc-options=-Werror all

    - name: Run tests
      run: cabal test all

    - name: Test coverage
      run: |
        cabal test all --enable-coverage
        cabal exec -- hpc report dist-newstyle/build/*/ghc-*/pushme-*/t/pushme-tests/hpc/vanilla/tix/pushme-tests/pushme-tests.tix || true

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up HLint
      uses: haskell-actions/hlint-setup@v2

    - name: Run HLint
      uses: haskell-actions/hlint-run@v2
      with:
        path: '["Main.hs", "src/"]'
        fail-on: warning

  format:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: haskell-actions/setup@v2
      with:
        ghc-version: '9.10'
        cabal-version: '3.10'

    - name: Install fourmolu
      run: cabal install fourmolu

    - name: Check formatting
      run: |
        fourmolu --mode check Main.hs src/Pushme/Options.hs test/Main.hs
